name: Deploy to accountability.kineticgain.com

# Node/Vite/React -> Hostinger FTP at /accountability/
on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "src/**"
      - "scripts/**"
      - "fixtures/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-board-decision-accountability-ledger
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build + FTP-sync to accountability.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install
        run: npm ci || npm install

      - name: Verify
        run: npm run verify

      - name: Build
        run: |
          if npm run | grep -q "^  prerender$"; then
            npm run prerender
          else
            npm run build
          fi

      - name: Verify build output
        run: |
          if [ -d "site" ]; then DEPLOY_DIR="site"
          elif [ -d "dist" ]; then DEPLOY_DIR="dist"
          elif [ -d "build" ]; then DEPLOY_DIR="build"
          else
            echo "FAIL: no site/, dist/, or build/ produced"
            exit 1
          fi
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
          test -f "$DEPLOY_DIR/index.html" || (echo "FAIL: $DEPLOY_DIR/index.html missing" && exit 1)
          grep -q "Product depth" "$DEPLOY_DIR/index.html" || (echo "FAIL: Product depth marker missing" && exit 1)
          grep -q "What these repos have in common" "$DEPLOY_DIR/index.html" || (echo "FAIL: shared repo pattern marker missing" && exit 1)
          grep -q "portfolio.kineticgain.com" "$DEPLOY_DIR/index.html" || (echo "FAIL: portfolio footer marker missing" && exit 1)

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD || secrets.FTP_PASS }}
          local-dir: ./${{ env.DEPLOY_DIR }}/
          server-dir: /accountability/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**

      - name: Verify live deployment
        run: |
          sleep 10
          html="$(curl -fsSL --retry 3 --retry-delay 5 "https://accountability.kineticgain.com/?deploy=${GITHUB_SHA}")"
          printf '%s' "$html" | grep -q "Product depth" || (echo "FAIL: live Product depth marker missing" && exit 1)
          printf '%s' "$html" | grep -q "What these repos have in common" || (echo "FAIL: live shared repo pattern marker missing" && exit 1)
          printf '%s' "$html" | grep -q "portfolio.kineticgain.com" || (echo "FAIL: live portfolio footer marker missing" && exit 1)
